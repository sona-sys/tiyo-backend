<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIYO Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    try {
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              dark: { 900: '#121212', 800: '#1e1e1e', 700: '#2c2c2e', 600: '#3a3a3c' },
              accent: '#BB86FC',
              teal: '#03DAC6',
            }
          }
        }
      }
    } catch(e) { /* Tailwind CDN didn't load — page works without styling */ }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-btn.active { background: #BB86FC; color: #121212; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    table { border-collapse: collapse; width: 100%; }
    th { position: sticky; top: 0; z-index: 1; }
    /* Fallback: don't rely on Tailwind CDN for initial visibility */
    .hidden { display: none !important; }
    /* Minimal fallback styles if Tailwind CDN fails */
    body { background: #121212; color: #e0e0e0; margin: 0; padding: 0; }
    input[type="password"] { padding: 10px; font-size: 16px; border: 1px solid #555; border-radius: 8px; background: #1e1e1e; color: #fff; width: 250px; }
    button { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; border-radius: 8px; background: #BB86FC; color: #121212; font-weight: bold; }
    button:hover { opacity: 0.9; }
    #loginScreen { text-align: center; padding-top: 15vh; }
    #loginError { color: #ff6b6b; }
  </style>
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen">

  <!-- Login Screen -->
  <div id="loginScreen" class="flex items-center justify-center min-h-screen">
    <div class="bg-dark-800 p-8 rounded-2xl border border-dark-700 w-full max-w-sm">
      <h1 class="text-2xl font-bold text-accent mb-2">TIYO Admin</h1>
      <p class="text-gray-500 text-sm mb-6">Enter your admin password to continue</p>
      <input id="passwordInput" type="password" placeholder="Admin password"
        class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white mb-4 focus:outline-none focus:border-accent">
      <button onclick="doLogin()"
        class="w-full bg-accent text-dark-900 font-bold py-3 rounded-xl hover:opacity-90 transition">
        Sign In
      </button>
      <p id="loginError" class="text-red-400 text-sm mt-3" style="display:none">Invalid password</p>
    </div>
  </div>

  <!-- Dashboard (hidden until login) -->
  <div id="dashboard" style="display:none">
    <!-- Header -->
    <header class="bg-dark-800 border-b border-dark-700 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
      <div class="flex items-center gap-3">
        <h1 class="text-xl font-bold text-accent">TIYO</h1>
        <span class="text-gray-500 text-sm">Admin Dashboard</span>
      </div>
      <button onclick="refreshAll()" class="text-sm text-gray-400 hover:text-accent transition">Refresh</button>
    </header>

    <!-- Stats Cards -->
    <div id="statsSection" class="p-6">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="statsGrid">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- Tabs -->
    <div class="px-6 flex gap-2 mb-4 overflow-x-auto">
      <button class="tab-btn active px-4 py-2 rounded-full text-sm font-semibold bg-dark-700 text-gray-300 transition" onclick="switchTab('users')">Users</button>
      <button class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-dark-700 text-gray-300 transition" onclick="switchTab('creators')">Creators</button>
      <button class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-dark-700 text-gray-300 transition" onclick="switchTab('calls')">Calls</button>
      <button class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-dark-700 text-gray-300 transition" onclick="switchTab('transactions')">Transactions</button>
      <button class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-dark-700 text-gray-300 transition" onclick="switchTab('suspended')">Suspended</button>
    </div>

    <!-- Tab Content -->
    <div class="px-6 pb-12">
      <div class="bg-dark-800 rounded-2xl border border-dark-700 overflow-hidden">
        <div id="tableContainer" class="overflow-x-auto max-h-[60vh] overflow-y-auto">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>
  </div>

<script>
  let adminKey = '';
  const BASE = window.location.origin;

  // ─── Auth ─────────────────────────────────────────────
  function doLogin() {
    console.log('[ADMIN] doLogin called');
    adminKey = document.getElementById('passwordInput').value.trim();
    console.log('[ADMIN] password length:', adminKey.length);
    if (!adminKey) { console.log('[ADMIN] empty password, returning'); return; }
    var btn = document.querySelector('#loginScreen button');
    btn.textContent = 'Signing in...';
    btn.disabled = true;
    var url = BASE + '/api/admin/stats';
    console.log('[ADMIN] fetching:', url);
    // Test the key by hitting stats endpoint
    fetch(url, { headers: { 'x-admin-key': adminKey } })
      .then(function(r) {
        console.log('[ADMIN] response status:', r.status);
        if (!r.ok) throw new Error('bad key, status: ' + r.status);
        return r.json();
      })
      .then(function(data) {
        console.log('[ADMIN] login success, stats:', JSON.stringify(data).substring(0, 100));
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        refreshAll();
      })
      .catch(function(err) {
        console.error('[ADMIN] login failed:', err.message);
        document.getElementById('loginError').style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      });
  }

  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ─── API helpers ──────────────────────────────────────
  function api(endpoint) {
    return fetch(BASE + endpoint, { headers: { 'x-admin-key': adminKey } })
      .then(r => r.json());
  }

  // ─── Stats ────────────────────────────────────────────
  function renderStats(stats) {
    const cards = [
      { label: 'Total Users', value: stats.totalUsers, color: 'text-white' },
      { label: 'Total Creators', value: stats.totalCreators, color: 'text-accent' },
      { label: 'Total Calls', value: stats.totalCalls, color: 'text-teal' },
      { label: 'Completed Calls', value: stats.completedCalls, color: 'text-green-400' },
      { label: 'Total Revenue', value: '₹' + stats.totalRevenue.toFixed(0), color: 'text-yellow-400' },
      { label: 'Total Recharges', value: '₹' + stats.totalRecharges.toFixed(0), color: 'text-blue-400' },
      { label: 'New Users (7d)', value: stats.newUsers7d, color: 'text-purple-400' },
      { label: 'Calls (7d)', value: stats.calls7d, color: 'text-pink-400' },
    ];
    document.getElementById('statsGrid').innerHTML = cards.map(c => `
      <div class="bg-dark-800 border border-dark-700 rounded-xl p-4">
        <div class="${c.color} text-2xl font-bold">${c.value}</div>
        <div class="text-gray-500 text-xs mt-1">${c.label}</div>
      </div>
    `).join('');
  }

  // ─── Tables ───────────────────────────────────────────
  let currentTab = 'users';

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    loadTab(tab);
  }

  function loadTab(tab) {
    document.getElementById('tableContainer').innerHTML =
      '<div class="p-8 text-center text-gray-500">Loading...</div>';

    switch (tab) {
      case 'users': return api('/api/admin/users?limit=100').then(renderUsersTable);
      case 'creators': return api('/api/admin/creators').then(renderCreatorsTable);
      case 'calls': return api('/api/admin/calls?limit=100').then(renderCallsTable);
      case 'transactions': return api('/api/admin/transactions?limit=100').then(renderTransactionsTable);
      case 'suspended': return api('/api/admin/suspended-users').then(renderSuspendedTable);
    }
  }

  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) + ' ' +
           dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  }

  function fmtDuration(s) {
    if (!s) return '—';
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }

  function statusBadge(status) {
    const colors = {
      completed: 'bg-green-900 text-green-300',
      initiated: 'bg-yellow-900 text-yellow-300',
      ringing: 'bg-blue-900 text-blue-300',
      connected: 'bg-teal text-dark-900',
      rejected: 'bg-red-900 text-red-300',
      missed: 'bg-orange-900 text-orange-300',
      success: 'bg-green-900 text-green-300',
      failed: 'bg-red-900 text-red-300',
      pending: 'bg-yellow-900 text-yellow-300',
      suspended: 'bg-red-900 text-red-300',
    };
    const cls = colors[status] || 'bg-dark-700 text-gray-400';
    return '<span class="px-2 py-0.5 rounded-full text-xs font-medium ' + cls + '">' + (status || '—') + '</span>';
  }

  function humanizeReason(reason) {
    if (!reason) return 'Legacy/Unknown';
    const labels = {
      caller_cancelled_before_answer: 'Caller Cancelled Before Answer',
      creator_declined: 'Creator Declined',
      no_answer_timeout: 'No Answer Timeout',
      caller_hangup: 'Caller Hung Up',
      creator_hangup: 'Creator Hung Up',
      remote_left: 'Remote Left',
      network_drop_timeout: 'Network Drop Timeout',
      system_cleanup: 'System Cleanup',
    };
    return labels[reason] || reason.replaceAll('_', ' ');
  }

  function endReasonBadge(reason) {
    if (!reason) {
      return '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-dark-700 text-gray-400">Legacy/Unknown</span>';
    }

    const colors = {
      caller_cancelled_before_answer: 'bg-orange-900 text-orange-300',
      creator_declined: 'bg-red-900 text-red-300',
      no_answer_timeout: 'bg-yellow-900 text-yellow-300',
      caller_hangup: 'bg-blue-900 text-blue-300',
      creator_hangup: 'bg-purple-900 text-purple-300',
      remote_left: 'bg-cyan-900 text-cyan-300',
      network_drop_timeout: 'bg-amber-900 text-amber-300',
      system_cleanup: 'bg-gray-700 text-gray-300',
    };

    const cls = colors[reason] || 'bg-dark-700 text-gray-300';
    return '<span class="px-2 py-0.5 rounded-full text-xs font-medium ' + cls + '">' + humanizeReason(reason) + '</span>';
  }

  function endedByLabel(call) {
    if (!call || call.endedByUserId == null) {
      return '<span class="text-gray-500">System</span>';
    }

    if (call.endedByUserId === call.caller_id) {
      return 'Caller <span class="text-gray-500">#' + call.endedByUserId + '</span>';
    }

    if (call.endedByUserId === call.receiver_id) {
      return 'Creator <span class="text-gray-500">#' + call.endedByUserId + '</span>';
    }

    return '#' + call.endedByUserId;
  }

  function renderCallsSummary(calls) {
    const reasonCounts = {};
    let legacyCount = 0;

    calls.forEach(c => {
      if (!c.endReason) {
        legacyCount += 1;
        return;
      }
      reasonCounts[c.endReason] = (reasonCounts[c.endReason] || 0) + 1;
    });

    const orderedReasons = Object.entries(reasonCounts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 6);

    const chips = orderedReasons.map(([reason, count]) =>
      '<div class="bg-dark-700 rounded-xl px-3 py-2 min-w-[160px]">' +
        '<div class="text-xs text-gray-500">End reason</div>' +
        '<div class="text-sm font-semibold text-white mt-1">' + humanizeReason(reason) + '</div>' +
        '<div class="text-xs text-gray-400 mt-1">' + count + ' call' + (count === 1 ? '' : 's') + '</div>' +
      '</div>'
    );

    if (legacyCount > 0) {
      chips.push(
        '<div class="bg-dark-700 rounded-xl px-3 py-2 min-w-[160px]">' +
          '<div class="text-xs text-gray-500">Legacy rows</div>' +
          '<div class="text-sm font-semibold text-white mt-1">Unknown end reason</div>' +
          '<div class="text-xs text-gray-400 mt-1">' + legacyCount + ' call' + (legacyCount === 1 ? '' : 's') + '</div>' +
        '</div>'
      );
    }

    return (
      '<div class="p-4 border-b border-dark-700">' +
        '<div class="text-sm text-gray-400 mb-3">Diagnostics on the ' + calls.length + ' most recent calls</div>' +
        '<div class="flex gap-3 overflow-x-auto">' + chips.join('') + '</div>' +
      '</div>'
    );
  }

  function renderUsersTable(users) {
    let html = '<table><thead><tr class="bg-dark-700 text-left text-xs text-gray-400 uppercase">';
    html += '<th class="px-4 py-3">ID</th><th class="px-4 py-3">Name</th><th class="px-4 py-3">Phone</th>';
    html += '<th class="px-4 py-3">Role</th><th class="px-4 py-3">Balance</th><th class="px-4 py-3">Joined</th></tr></thead><tbody>';
    users.forEach(u => {
      const roleBadge = u.role === 'creator'
        ? '<span class="bg-accent text-dark-900 px-2 py-0.5 rounded-full text-xs font-medium">creator</span>'
        : '<span class="text-gray-500 text-xs">user</span>';
      html += '<tr class="border-t border-dark-700 hover:bg-dark-700/50">';
      html += '<td class="px-4 py-3 text-sm text-gray-400">' + u.id + '</td>';
      html += '<td class="px-4 py-3 text-sm font-medium">' + (u.name || '<span class=text-gray-600>—</span>') + '</td>';
      html += '<td class="px-4 py-3 text-sm text-gray-400">' + u.phone + '</td>';
      html += '<td class="px-4 py-3">' + roleBadge + '</td>';
      html += '<td class="px-4 py-3 text-sm text-green-400">₹' + u.balance.toFixed(0) + '</td>';
      html += '<td class="px-4 py-3 text-sm text-gray-500">' + fmtDate(u.created_at) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('tableContainer').innerHTML = html;
  }

  function renderCreatorsTable(creators) {
    let html = '<table><thead><tr class="bg-dark-700 text-left text-xs text-gray-400 uppercase">';
    html += '<th class="px-4 py-3">Name</th><th class="px-4 py-3">Status</th>';
    html += '<th class="px-4 py-3">Voice Rate</th><th class="px-4 py-3">Video Rate</th>';
    html += '<th class="px-4 py-3">Rating</th><th class="px-4 py-3">Calls</th>';
    html += '<th class="px-4 py-3">Earnings</th><th class="px-4 py-3">Balance</th></tr></thead><tbody>';
    creators.forEach(c => {
      const status = c.is_online
        ? '<span class="inline-block w-2 h-2 rounded-full bg-green-400 mr-1"></span>Online'
        : '<span class="inline-block w-2 h-2 rounded-full bg-gray-600 mr-1"></span>Offline';
      html += '<tr class="border-t border-dark-700 hover:bg-dark-700/50">';
      html += '<td class="px-4 py-3 text-sm font-medium">' + (c.name || '—') + '</td>';
      html += '<td class="px-4 py-3 text-sm">' + status + '</td>';
      html += '<td class="px-4 py-3 text-sm text-accent">₹' + c.rate + '/min</td>';
      html += '<td class="px-4 py-3 text-sm text-teal">₹' + c.video_rate + '/min</td>';
      html += '<td class="px-4 py-3 text-sm text-yellow-400">⭐ ' + c.rating.toFixed(1) + '</td>';
      html += '<td class="px-4 py-3 text-sm">' + c.total_calls + '</td>';
      html += '<td class="px-4 py-3 text-sm text-green-400">₹' + c.total_earnings.toFixed(0) + '</td>';
      html += '<td class="px-4 py-3 text-sm">₹' + c.balance.toFixed(0) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('tableContainer').innerHTML = html;
  }

  function renderCallsTable(calls) {
    let html = renderCallsSummary(calls);
    html += '<table><thead><tr class="bg-dark-700 text-left text-xs text-gray-400 uppercase">';
    html += '<th class="px-4 py-3">ID</th><th class="px-4 py-3">Caller</th><th class="px-4 py-3">Creator</th>';
    html += '<th class="px-4 py-3">Type</th><th class="px-4 py-3">Status</th>';
    html += '<th class="px-4 py-3">End Reason</th><th class="px-4 py-3">Ended By</th>';
    html += '<th class="px-4 py-3">Duration</th><th class="px-4 py-3">Cost</th>';
    html += '<th class="px-4 py-3">Date</th></tr></thead><tbody>';
    calls.forEach(c => {
      const typeBadge = c.call_type === 'video'
        ? '<span class="text-teal text-xs font-medium">Video</span>'
        : '<span class="text-accent text-xs font-medium">Voice</span>';
      html += '<tr class="border-t border-dark-700 hover:bg-dark-700/50">';
      html += '<td class="px-4 py-3 text-sm text-gray-400">' + c.id + '</td>';
      html += '<td class="px-4 py-3 text-sm">' + (c.caller_name || c.caller_phone || '—') + '</td>';
      html += '<td class="px-4 py-3 text-sm">' + (c.receiver_name || c.receiver_phone || '—') + '</td>';
      html += '<td class="px-4 py-3">' + typeBadge + '</td>';
      html += '<td class="px-4 py-3">' + statusBadge(c.status) + '</td>';
      html += '<td class="px-4 py-3 text-sm text-gray-300">' + endReasonBadge(c.endReason) + '</td>';
      html += '<td class="px-4 py-3 text-sm text-gray-300">' + endedByLabel(c) + '</td>';
      html += '<td class="px-4 py-3 text-sm">' + fmtDuration(c.duration_seconds) + '</td>';
      html += '<td class="px-4 py-3 text-sm text-green-400">' + (c.total_cost > 0 ? '₹' + c.total_cost.toFixed(0) : '—') + '</td>';
      html += '<td class="px-4 py-3 text-sm text-gray-500">' + fmtDate(c.created_at) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('tableContainer').innerHTML = html;
  }

  function renderTransactionsTable(txns) {
    let html = '<table><thead><tr class="bg-dark-700 text-left text-xs text-gray-400 uppercase">';
    html += '<th class="px-4 py-3">ID</th><th class="px-4 py-3">User</th>';
    html += '<th class="px-4 py-3">Amount</th><th class="px-4 py-3">Type</th>';
    html += '<th class="px-4 py-3">Status</th><th class="px-4 py-3">Date</th></tr></thead><tbody>';
    txns.forEach(t => {
      html += '<tr class="border-t border-dark-700 hover:bg-dark-700/50">';
      html += '<td class="px-4 py-3 text-sm text-gray-400">' + t.id + '</td>';
      html += '<td class="px-4 py-3 text-sm">' + (t.user_name || t.user_phone || '—') + '</td>';
      html += '<td class="px-4 py-3 text-sm text-green-400">₹' + t.amount.toFixed(0) + '</td>';
      html += '<td class="px-4 py-3 text-sm text-gray-400">' + t.type + '</td>';
      html += '<td class="px-4 py-3">' + statusBadge(t.status) + '</td>';
      html += '<td class="px-4 py-3 text-sm text-gray-500">' + fmtDate(t.created_at) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('tableContainer').innerHTML = html;
  }

  function renderSuspendedTable(users) {
    if (!users || users.length === 0) {
      document.getElementById('tableContainer').innerHTML =
        '<div class="p-8 text-center text-gray-500">No suspended users</div>';
      return;
    }
    let html = '<table><thead><tr class="bg-dark-700 text-left text-xs text-gray-400 uppercase">';
    html += '<th class="px-4 py-3">ID</th><th class="px-4 py-3">Name</th><th class="px-4 py-3">Phone</th>';
    html += '<th class="px-4 py-3">Block Count</th><th class="px-4 py-3">Status</th>';
    html += '<th class="px-4 py-3">Action</th></tr></thead><tbody>';
    users.forEach(u => {
      html += '<tr class="border-t border-dark-700 hover:bg-dark-700/50">';
      html += '<td class="px-4 py-3 text-sm text-gray-400">' + u.id + '</td>';
      html += '<td class="px-4 py-3 text-sm font-medium">' + (u.name || '—') + '</td>';
      html += '<td class="px-4 py-3 text-sm text-gray-400">' + u.phone + '</td>';
      html += '<td class="px-4 py-3 text-sm text-red-400">' + (u.block_count || '—') + '</td>';
      html += '<td class="px-4 py-3">' + statusBadge('suspended') + '</td>';
      html += '<td class="px-4 py-3"><button onclick="unsuspendUser(' + u.id + ')" class="bg-green-700 text-white text-xs px-3 py-1 rounded-full hover:bg-green-600">Unsuspend</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('tableContainer').innerHTML = html;
  }

  function unsuspendUser(userId) {
    if (!confirm('Unsuspend user #' + userId + '?')) return;
    fetch(BASE + '/api/admin/users/' + userId + '/unsuspend', {
      method: 'POST',
      headers: { 'x-admin-key': adminKey, 'Content-Type': 'application/json' },
    })
      .then(r => { if (!r.ok) throw new Error('Failed'); return r.json(); })
      .then(() => { alert('User unsuspended!'); loadTab('suspended'); })
      .catch(err => alert('Error: ' + err.message));
  }

  // ─── Refresh all data ─────────────────────────────────
  function refreshAll() {
    api('/api/admin/stats').then(renderStats);
    loadTab(currentTab);
  }
</script>
</body>
</html>
